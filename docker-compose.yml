version: '3.8'

services:
  # O cérebro pensante — Worion API
  worion-api:
    build: .
    container_name: worion-api
    ports:
      - "3766:3766"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  # A face que o mundo vê — Nginx servindo o frontend
  worion-web:
    image: nginx:alpine
    container_name: worion-web
    ports:
      - "3000:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html
      - ./css:/usr/share/nginx/html/css
      - ./js:/usr/share/nginx/html/js
      - ./agents:/usr/share/nginx/html/agents
    restart: unless-stopped

  # A memória viva — Ollama com BGE-M3
  ollama:
    image: ollama/ollama:latest
    container_name: worion-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data: